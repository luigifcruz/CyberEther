name: Ubuntu Container Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            base: amd64/ubuntu:24.04@sha256:cdb5fd928fced577cfecf12c8966e830fcdf42ee481fb0b91904eeddc2fe5eff
          - arch: aarch64
            runner: ubuntu-24.04-arm
            base: arm64v8/ubuntu:24.04@sha256:7607b6f97024ef850f1bd6e91a89273beb5973d04432c5b87f15f813d64b9c05

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build image
        uses: docker/build-push-action@v5.4.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local/cyberether:${{ matrix.arch }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            BUILD_TYPE=release

      - name: Smoke test
        run: |
          docker run --rm local/cyberether:${{ matrix.arch }} test -f /usr/bin/cyberether

      - name: Meson tests
        run: |
          docker run --rm local/cyberether:${{ matrix.arch }} meson test -C /workspace/build --print-errorlogs

      - name: Save image artifact
        run: |
          set -euo pipefail
          mkdir -p .dist/images
          docker save local/cyberether:${{ matrix.arch }} | gzip > .dist/images/cyberether-ubuntu24-${{ matrix.arch }}.tar.gz

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: cyberether-ubuntu24-${{ matrix.arch }}
          path: .dist/images/cyberether-ubuntu24-${{ matrix.arch }}.tar.gz
