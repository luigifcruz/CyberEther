name: CI

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    uses: ./.github/workflows/linux-build.yml

  windows:
    uses: ./.github/workflows/windows-build.yml

  macos:
    uses: ./.github/workflows/macos-build.yml

  macos-package:
    needs: macos
    uses: ./.github/workflows/macos-package.yml

  emscripten:
    uses: ./.github/workflows/emscripten-build.yml
