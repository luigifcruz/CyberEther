name: Ubuntu Container Build

on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.tag }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: &container_variants
          - tag: x86_64
            runner: ubuntu-latest
            base: amd64/ubuntu:24.04@sha256:cdb5fd928fced577cfecf12c8966e830fcdf42ee481fb0b91904eeddc2fe5eff
          - tag: aarch64
            runner: ubuntu-24.04-arm
            base: arm64v8/ubuntu:24.04@sha256:7607b6f97024ef850f1bd6e91a89273beb5973d04432c5b87f15f813d64b9c05
          - tag: x86_64-cuda
            runner: ubuntu-latest
            base: nvidia/cuda:13.0.2-devel-ubuntu24.04
          - tag: aarch64-cuda
            runner: ubuntu-24.04-arm
            base: nvidia/cuda:13.0.2-devel-ubuntu24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build image
        uses: docker/build-push-action@v5.4.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local/cyberether:${{ matrix.tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            BUILD_TYPE=release

      - name: Smoke test
        run: |
          docker run --rm local/cyberether:${{ matrix.tag }} test -f /usr/bin/cyberether

      - name: Meson tests
        if: ${{ !contains(matrix.tag, 'cuda') }}
        run: |
          docker run --rm local/cyberether:${{ matrix.tag }} meson test -C /workspace/build --print-errorlogs

      - name: Save image artifact
        run: |
          set -euo pipefail
          mkdir -p .dist/images
          docker save local/cyberether:${{ matrix.tag }} | gzip > .dist/images/cyberether-ubuntu24-${{ matrix.tag }}.tar.gz

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: cyberether-container-ubuntu24-${{ matrix.tag }}
          path: .dist/images/cyberether-ubuntu24-${{ matrix.tag }}.tar.gz

  publish:
    if: ${{ inputs.publish }}
    needs: build
    name: publish (${{ matrix.tag }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: *container_variants
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          name: cyberether-container-ubuntu24-${{ matrix.tag }}
          path: .dist/images

      - name: Load image
        run: |
          set -euo pipefail
          gzip -dc .dist/images/cyberether-ubuntu24-${{ matrix.tag }}.tar.gz | docker load

      - name: Login to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          set -euo pipefail
          REPO_LOWER="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          TAG_BASE="ghcr.io/${REPO_LOWER}"
          BASE_TAG="ubuntu24-${{ matrix.tag }}"
          VERSION_TAG="${GITHUB_REF_NAME}-${BASE_TAG}"

          docker tag local/cyberether:${{ matrix.tag }} "${TAG_BASE}:${BASE_TAG}"
          docker push "${TAG_BASE}:${BASE_TAG}"

          docker tag local/cyberether:${{ matrix.tag }} "${TAG_BASE}:${VERSION_TAG}"
          docker push "${TAG_BASE}:${VERSION_TAG}"
