name: Windows Build

on:
  workflow_call:
    inputs:
      package_msi:
        type: boolean
        default: false

permissions:
  contents: read

env:
  SYSTEM_WINDOWS_DLLS: |
    KERNEL32.dll
    USER32.dll
    GDI32.dll
    SHELL32.dll
    OLE32.dll
    OLEAUT32.dll
    WS2_32.dll
    COMDLG32.dll
    COMCTL32.dll
    ADVAPI32.dll
    RPCRT4.dll
    SHLWAPI.dll
    IMM32.dll
    MF.dll
    MFPlat.dll
    MFReadWrite.dll
    BCRYPT.dll
    CRYPT32.dll
    DNSAPI.dll
    IPHLPAPI.dll
    NORMALIZ.dll
    NTDLL.dll
    SECUR32.dll
    VERSION.dll
    VULKAN-1.dll
    WINMM.dll
    WLDAP32.dll
    api-ms-win-core-synch-l1-2-0.dll
    api-ms-win-core-winrt-l1-1-0.dll
    api-ms-win-core-winrt-string-l1-1-0.dll
  BUNDLED_WINDOWS_DLLS: |
    jetstream.dll
  VULKAN_VERSION: 1.4.309.0
  VULKAN_SDK_SHA256: 48b132169b64fe65cdb0f20970195335a65354e73f1ea5373032c2a8bbad4297

jobs:
  bin:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install system dependencies
        run: |
          choco install nasm winflexbison3 pkgconfiglite -y --no-progress

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson ninja numpy mapbox_earcut pyyaml

      - name: Install Vulkan SDK
        run: |
          $installerPath = Join-Path $pwd 'vulkan-sdk.exe'
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/vulkan-sdk.exe" -OutFile $installerPath

          $sha = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($sha -ne $env:VULKAN_SDK_SHA256) {
            throw "Unexpected Vulkan SDK SHA256: $sha"
          }

          Start-Process -FilePath $installerPath -ArgumentList '--accept-licenses', '--default-answer', '--confirm-command', 'install' -Wait

          $sdkRoot = "C:\VulkanSDK\$env:VULKAN_VERSION"
          if (!(Test-Path $sdkRoot)) {
            throw "Vulkan SDK was not installed to $sdkRoot"
          }

          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$sdkRoot\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows binary
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          if (Test-Path build) {
            Remove-Item -Recurse -Force build
          }

          meson setup --vsenv `
            -Dbuildtype=release `
            -Ddefault_library=shared `
            -Db_vscrt=static_from_buildtype `
            -Dtests=true `
            -Dexamples=false `
            -Dremote=enabled `
            build
          meson compile -C build

          New-Item -ItemType Directory -Force -Path .dist/artifacts | Out-Null
          tar -C build -czf .dist/artifacts/cyberether-windows-x86_64.tar.gz cyberether.exe jetstream.dll

      - name: Validate Windows binary
        run: |
          if (!(Test-Path build/cyberether.exe)) {
            throw 'cyberether.exe was not produced.'
          }
          if (!(Test-Path build/jetstream.dll)) {
            throw 'jetstream.dll was not produced.'
          }

          meson test -C build --print-errorlogs

      - name: Upload Meson test logs
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: windows-meson-test-logs
          path: |
            build/meson-logs/testlog.txt
            build/meson-logs/testlog.json
          if-no-files-found: ignore

      - name: Check Windows binary dependencies
        uses: ./.github/actions/check-dynamic-deps
        with:
          format: pe
          targets: |
            build/cyberether.exe
            build/jetstream.dll
          allowlist: |
            ${{ env.SYSTEM_WINDOWS_DLLS }}
            ${{ env.BUNDLED_WINDOWS_DLLS }}
          tool-path: dumpbin

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: cyberether-bin-windows-x86_64
          path: .dist/artifacts/cyberether-windows-x86_64.tar.gz

  msi:
    if: ${{ inputs.package_msi }}
    needs: bin
    runs-on: windows-latest
    env:
      ARCH: x86_64
      CYBERETHER_BINARY: .dist\bin\cyberether.exe
      JETSTREAM_DLL: .dist\bin\jetstream.dll
      OUTPUT_DIR: .dist\windows
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cyberether-bin-windows-x86_64
          path: .dist/artifacts

      - name: Extract Windows binary archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .dist\bin | Out-Null
          tar -C .dist\bin -xzf .dist\artifacts\cyberether-windows-x86_64.tar.gz
          if (!(Test-Path .dist\bin\cyberether.exe)) {
            throw 'cyberether.exe was not extracted.'
          }
          if (!(Test-Path .dist\bin\jetstream.dll)) {
            throw 'jetstream.dll was not extracted.'
          }

      - name: Package MSI
        shell: pwsh
        run: apps/windows/create-msi.ps1

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cyberether-msi-windows-x86_64
          path: .dist/windows/*.msi
