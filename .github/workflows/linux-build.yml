name: Linux Build

on:
  workflow_call:

permissions:
  contents: read

env:
  SYSTEM_SHARED_LIBS: |
    libc.so.6
    libm.so.6
    libstdc++.so.6
    libgcc_s.so.1
    libpthread.so.0
    libdl.so.2
    librt.so.1
    ld-linux-x86-64.so.2
    ld-linux-aarch64.so.1
    libvulkan.so.1
    libz.so.1
    libjetstream.so
    libX11.so.6
    libXrandr.so.2
    libXi.so.6
    libXinerama.so.1
    libXcursor.so.1
    libxkbcommon.so.0
    libwayland-client.so.0
    libwayland-cursor.so.0
    libwayland-egl.so.1

jobs:
  bin:
    name: bin (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            image: quay.io/pypa/manylinux_2_34_x86_64@sha256:40eab5671867fade46e06d5e6f22269335e396a5fcd2e11973ff8bce0ed004de
            runner: ubuntu-latest
          - arch: aarch64
            image: quay.io/pypa/manylinux_2_34_aarch64@sha256:b1d54ba07caa4f3c2144d24d179f006fac7bccd76323ea0673634243bf2aabd5
            runner: ubuntu-24.04-arm
    container:
      image: ${{ matrix.image }}
    defaults:
      run:
        shell: bash
    env:
      PATH: /opt/python/cp312-cp312/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Install system dependencies
        run: |
          set -euo pipefail
          dnf install -y \
            git gcc-c++ glslang openssl-devel \
            wayland-devel libxkbcommon-devel \
            libXcursor-devel libXi-devel libXinerama-devel libXrandr-devel \
            vulkan-loader-devel pkgconf-pkg-config
          dnf clean all

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --break-system-packages meson ninja numpy mapbox_earcut pyyaml

      - name: Build binary
        run: |
          set -euo pipefail
          rm -rf build
          meson setup build --default-library=static -Dprefix=/opt/cyberether -Dbuildtype=release -Dexamples=false
          meson compile -C build
          meson install -C build

      - name: Validate binary
        run: |
          set -euo pipefail
          test -f /opt/cyberether/bin/cyberether
          meson test -C build --print-errorlogs

      - name: Check binary dynamic dependencies
        uses: ./.github/actions/check-dynamic-deps
        with:
          format: elf
          targets: |
            /opt/cyberether/bin/cyberether
          allowlist: ${{ env.SYSTEM_SHARED_LIBS }}

      - name: Package binary
        run: |
          set -euo pipefail
          mkdir -p .dist/artifacts .dist/bin
          cp /opt/cyberether/bin/cyberether .dist/bin/cyberether
          tar -C .dist/bin -czf .dist/artifacts/cyberether-manylinux-${ARCH}.tar.gz cyberether

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: cyberether-bin-manylinux-${{ matrix.arch }}
          path: .dist/artifacts/cyberether-manylinux-${{ matrix.arch }}.tar.gz
