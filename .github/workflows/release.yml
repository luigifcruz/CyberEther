name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  linux:
    uses: ./.github/workflows/linux-build.yml

  wheel:
    uses: ./.github/workflows/wheel-build.yml

  windows:
    uses: ./.github/workflows/windows-build.yml

  macos-build:
    uses: ./.github/workflows/macos-build.yml

  macos-package:
    needs: macos-build
    runs-on: macos-14
    environment: macos-notarization
    env:
      CYBERETHER_BINARY: .dist/bin/cyberether
      JETSTREAM_DYLIB: .dist/bin/libjetstream.dylib
      OUTPUT_DIR: .dist/macos
      APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cyberether-macos-arm64
          path: .dist/artifacts

      - name: Extract macOS binary archive
        run: |
          set -euo pipefail
          mkdir -p .dist/bin
          tar -C .dist/bin -xzf .dist/artifacts/cyberether-macos-arm64.tar.gz
          test -f .dist/bin/cyberether
          test -f .dist/bin/libjetstream.dylib

      - name: Package app bundle
        run: apps/macos/create-app.sh

      - name: Package app notarization
        run: apps/macos/sign-notarize-app.sh

      - name: Package DMG
        run: apps/macos/create-dmg.sh

      - name: Package DMG notarization
        run: apps/macos/sign-notarize-dmg.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cyberether-macos-dmg
          path: .dist/macos/*.dmg

  emscripten:
    uses: ./.github/workflows/emscripten-build.yml

  containers:
    uses: ./.github/workflows/container-build.yml

  github-release:
    needs: [linux, wheel, windows, macos-build, macos-package, emscripten]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          pattern: '*manylinux*'
          path: .dist/artifacts
          merge-multiple: true

      - uses: actions/download-artifact@v4.3.0
        with:
          name: cyberether-windows-x86_64
          path: .dist/artifacts

      - uses: actions/download-artifact@v4.3.0
        with:
          name: cyberether-macos-arm64
          path: .dist/artifacts

      - uses: actions/download-artifact@v4.3.0
        with:
          name: cyberether-macos-dmg
          path: .dist/artifacts

      - uses: actions/download-artifact@v4.3.0
        with:
          name: cyberether-emscripten-wasm32
          path: .dist/artifacts

      - name: Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: |
            .dist/artifacts/*.tar.gz
            .dist/artifacts/*.dmg

  publish-containers:
    name: publish (${{ matrix.arch }})
    needs: containers
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          name: cyberether-ubuntu24-${{ matrix.arch }}
          path: .dist/images

      - name: Load image
        run: |
          set -euo pipefail
          gzip -dc .dist/images/cyberether-ubuntu24-${{ matrix.arch }}.tar.gz | docker load

      - name: Login to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          set -euo pipefail
          REPO_LOWER="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          TAG_BASE="ghcr.io/${REPO_LOWER}"
          BASE_TAG="ubuntu24-${{ matrix.arch }}"
          VERSION_TAG="${GITHUB_REF_NAME}-${BASE_TAG}"

          docker tag local/cyberether:${{ matrix.arch }} "${TAG_BASE}:${BASE_TAG}"
          docker push "${TAG_BASE}:${BASE_TAG}"

          docker tag local/cyberether:${{ matrix.arch }} "${TAG_BASE}:${VERSION_TAG}"
          docker push "${TAG_BASE}:${VERSION_TAG}"
