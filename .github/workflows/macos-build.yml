name: macOS Build

on:
  workflow_call:

permissions:
  contents: read

env:
  HOMEBREW_NO_AUTO_UPDATE: 1
  SYSTEM_MACOS_DYLIBS: |
    Metal.framework/Metal
    Foundation.framework/Foundation
    AudioToolbox.framework/AudioToolbox
    CoreFoundation.framework/CoreFoundation
    CoreAudio.framework/CoreAudio
    CoreGraphics.framework/CoreGraphics
    CoreServices.framework/CoreServices
    CFNetwork.framework/CFNetwork
    IOKit.framework/IOKit
    Security.framework/Security
    libz.1.dylib
    AppKit.framework/AppKit
    UniformTypeIdentifiers.framework/UniformTypeIdentifiers
    libc++.1.dylib
    libSystem.B.dylib
    libobjc.A.dylib

jobs:
  bin:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Install system dependencies
        run: |
          set -euo pipefail
          brew install pkg-config spirv-cross glslang

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --break-system-packages meson ninja numpy mapbox_earcut pyyaml

      - name: Build binary
        run: |
          set -euo pipefail
          rm -rf build
          meson setup build --default-library=static -Dbuildtype=release -Dexamples=false
          meson compile -C build

      - name: Validate binary
        run: |
          set -euo pipefail
          test -f build/cyberether
          meson test -C build parser flowgraph --print-errorlogs

      - name: Check binary dynamic dependencies
        uses: ./.github/actions/check-dynamic-deps
        with:
          format: macho
          targets: |
            build/cyberether
          allowlist: ${{ env.SYSTEM_MACOS_DYLIBS }}

      - name: Package binary
        run: |
          set -euo pipefail
          mkdir -p .dist/artifacts .dist/bin
          cp build/cyberether .dist/bin/
          tar -C .dist/bin -czf .dist/artifacts/cyberether-macos-arm64.tar.gz cyberether

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: cyberether-macos-arm64
          path: .dist/artifacts/cyberether-macos-arm64.tar.gz
