---
version: 2

title: Spectrum Analyzer
summary: Simple waterfall and lineplot.
author: Luigi
license: MIT
description: 'Shows how a CyberEther flowgraph can be used as a traditional SDR console. This example will take the samples from the SDR and display a frequency-domain representation of it.'

graph:
  - name: win
    module: window
    device: cpu
    runtime: native
    provider: generic
    config:
      size: 2048
    meta:
      node:
        y: 36
        x: 22
        height: 74
        width: 140
  - name: soapy
    module: soapy
    device: cpu
    runtime: native
    provider: generic
    config:
      bufferMultiplier: 512
      sampleRate: 2000000
      frequency: 9.49e+07
      numberOfTimeSamples: 2048
      numberOfBatches: 8
      automaticGain: true
      deviceString: 'driver=rtlsdr,serial=00000001'
    meta:
      node:
        y: 175
        x: 22
        height: 391
        width: 140
  - name: invert
    module: invert
    device: cpu
    runtime: native
    provider: generic
    input:
      - name: signal
        source: '${graph.win.output.window}'
    meta:
      node:
        y: 39
        x: 190
        height: 63
        width: 140
  - name: multiply
    module: multiply
    device: cpu
    runtime: native
    provider: generic
    input:
      - name: a
        source: '${graph.invert.output.signal}'
      - name: b
        source: '${graph.soapy.output.signal}'
    meta:
      node:
        y: 63
        x: 361
        height: 85
        width: 140
  - name: fft
    module: fft
    device: cpu
    runtime: native
    provider: generic
    config:
      forward: true
    input:
      - name: signal
        source: '${graph.multiply.output.product}'
    meta:
      node:
        y: 56
        x: 532
        height: 96
        width: 140
  - name: amplitude
    module: amplitude
    device: cpu
    runtime: native
    provider: generic
    input:
      - name: signal
        source: '${graph.fft.output.signal}'
    meta:
      node:
        y: 65
        x: 697
        height: 63
        width: 140
  - name: range
    module: range
    device: cpu
    runtime: native
    provider: generic
    config:
      max: 0
      min: -100
    input:
      - name: signal
        source: '${graph.amplitude.output.signal}'
    meta:
      node:
        y: 52
        x: 864
        height: 129
        width: 140
  - name: lineplot
    module: lineplot
    device: cpu
    runtime: native
    provider: generic
    config:
      thickness: 1
      decimation: 1
      numberOfHorizontalLines: 5
      numberOfVerticalLines: 11
      averaging: 1
    input:
      - name: signal
        source: '${graph.range.output.signal}'
    meta:
      surface_default:
        detachedWidth: 512
        attachedWidth: 354
        detached: false
        attachedHeight: 234
        detachedHeight: 512
      node:
        y: 19
        x: 1046
        height: 349
        width: 354
  - name: waterfall
    module: waterfall
    device: cpu
    runtime: native
    provider: generic
    config:
      interpolate: true
      height: 512
    input:
      - name: signal
        source: '${graph.range.output.signal}'
    meta:
      surface_default:
        detachedWidth: 512
        attachedWidth: 357
        detached: false
        attachedHeight: 187
        detachedHeight: 512
      node:
        y: 399
        x: 1043
        height: 302
        width: 357
