---
version: 2

title: 'Overlap-Add-Fold'
summary: 'Filter with overlap-add & resample.'
author: Luigi
license: MIT
description: Shows how to filter a signal in the frequency domain with a FIR filter. Uses multiply and add to reduce blocking artifacts. The signal is also folded and resampled.

graph:
  - name: soapy
    module: soapy
    device: cpu
    runtime: native
    provider: generic
    config:
      bufferMultiplier: 1024
      sampleRate: 2000000
      frequency: 9.69e+07
      numberOfTimeSamples: 8000
      numberOfBatches: 8
      automaticGain: true
      deviceString: driver=rtlsdr
    meta:
      node:
        y: 287
        x: 24
        height: 391
        width: 140
  - name: not22
    module: note
    device: cpu
    runtime: native
    provider: generic
    config:
      content: |-
        # Overlap-Add-Fold Example
        To understand the Overlap-Add section of this flowgraph, please, open the `Overlap-Add` example flowgraph. This is a continuation of that example that adds a `Fold` block for resampling the filtered signal. This decreases the computation necessary by reducing the IFFT size for each station.

        ### Suggestion
        The next example flowgraph `Multi-FM` abstracts this whole mechanism in a single `Filter Engine` block. Making it more practical for reuse.
    meta:
      node:
        y: 231.99997
        x: 843
        height: 287.00003
        width: 460
  - name: pad_soapy
    module: pad
    device: cpu
    runtime: native
    provider: generic
    config:
      axis: 1
      size: 100
    input:
      - name: unpadded
        source: '${graph.soapy.output.signal}'
    meta:
      node:
        y: 320.99997
        x: 217
        height: 129
        width: 140
  - name: fft_soapy
    module: fft
    device: cpu
    runtime: native
    provider: generic
    config:
      forward: true
    input:
      - name: signal
        source: '${graph.pad_soapy.output.padded}'
    meta:
      node:
        y: 326.99997
        x: 401
        height: 96
        width: 140
  - name: exp_dims27
    module: expand_dims
    device: cpu
    runtime: native
    provider: generic
    config:
      axis: 1
    input:
      - name: buffer
        source: '${graph.fft_soapy.output.signal}'
    meta:
      node:
        y: 315.99997
        x: 584
        height: 96.00003
        width: 140
  - name: flt
    module: filter_taps
    device: cpu
    runtime: native
    provider: generic
    config:
      taps: 101
      heads: 2
      center: '[400000, -400000]'
      bandwidth: 200000
      sampleRate: 2000000
    meta:
      node:
        y: -1
        x: 24
        height: 239
        width: 140
  - name: pad_flt
    module: pad
    device: cpu
    runtime: native
    provider: generic
    config:
      axis: 1
      size: 7999
    input:
      - name: unpadded
        source: '${graph.flt.output.coeffs}'
    meta:
      node:
        y: 24.99997
        x: 216
        height: 128.00003
        width: 140
  - name: fft_flt
    module: fft
    device: cpu
    runtime: native
    provider: generic
    config:
      forward: true
    input:
      - name: signal
        source: '${graph.pad_flt.output.padded}'
    meta:
      node:
        y: 19.99997
        x: 409
        height: 95.00003
        width: 140
  - name: mul
    module: multiply
    device: cpu
    runtime: native
    provider: generic
    input:
      - name: b
        source: '${graph.exp_dims27.output.buffer}'
      - name: a
        source: '${graph.fft_flt.output.signal}'
    meta:
      node:
        y: 18.99997
        x: 815
        height: 84.00003
        width: 140
  - name: fol36
    module: fold
    device: cpu
    runtime: native
    provider: generic
    config:
      size: 810
      offset: 0
      axis: 2
    input:
      - name: buffer
        source: '${graph.mul.output.product}'
    meta:
      node:
        y: 18.99997
        x: 1005
        height: 161.00003
        width: 140
  - name: ifft
    module: fft
    device: cpu
    runtime: native
    provider: generic
    config:
      forward: false
    input:
      - name: signal
        source: '${graph.fol36.output.buffer}'
    meta:
      node:
        y: 28.99997
        x: 1195
        height: 95.00003
        width: 140
  - name: unpad
    module: unpad
    device: cpu
    runtime: native
    provider: generic
