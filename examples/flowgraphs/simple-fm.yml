---
version: 2

title: Simple FM Receiver
summary: Radio receiver with RTLSDR.
author: Luigi
license: MIT
description: Shows the simplest way to demodulate an FM station using a RTL-SDR.

graph:
  - name: soapy
    module: soapy
    device: cpu
    runtime: native
    provider: generic
    config:
      bufferMultiplier: 512
      sampleRate: 240000
      frequency: 88.9e+06
      numberOfTimeSamples: 2048
      numberOfBatches: 8
      automaticGain: true
    meta:
      node:
        y: 50
        x: 50
        height: 309
        width: 233
  - name: fm
    module: fm
    device: cpu
    runtime: native
    provider: generic
    input:
      signal: '${graph.soapy.output.signal}'
    meta:
      node:
        y: 50
        x: 320
        height: 100
        width: 140
  - name: audio
    module: audio
    device: cpu
    runtime: native
    provider: generic
    config:
      inSampleRate: 240000
      outSampleRate: 48000
    input:
      buffer: '${graph.fm.output.signal}'
    meta:
      node:
        y: 50
        x: 500
        height: 150
        width: 200
