---
version: 2

title: ADS-B Flight Tracker
summary: Flight tracker using ADS-B data.
author: Luigi
license: MIT
description: Uses an SDR to receive ADS-B signals and track flights.

graph:
  - name: soapy
    module: soapy
    device: cpu
    runtime: native
    provider: generic
    config:
      bufferMultiplier: 4
      sampleRate: 2000000
      frequency: 1.09e+09
      numberOfTimeSamples: 8192
      numberOfBatches: 8
      automaticGain: true
    meta:
      node:
        y: 121
        x: 88
        height: 47
        width: 140
  - name: adsb
    module: adsb
    device: cpu
    runtime: native
    provider: generic
    input:
      signal: '${graph.soapy.output.signal}'
    meta:
      surface_default:
        detachedWidth: 506
        attachedWidth: 483
        detached: false
        attachedHeight: 243
        detachedHeight: 483
      node:
        y: 354
        x: 286
        height: 375
        width: 483
  - name: spectrum_engine
    module: spectrum_engine
    device: cpu
    runtime: native
    provider: generic
    config:
      rangeMin: -102.85714
      enableAgc: false
      rangeMax: 0
      enableScale: true
      axis: 1
    input:
      buffer: '${graph.soapy.output.signal}'
    meta:
      node:
        y: 74
        x: 570
        height: 162
        width: 140
  - name: lineplot
    module: lineplot
    device: cpu
    runtime: native
    provider: generic
    config:
      thickness: 1
      decimation: 1
      numberOfHorizontalLines: 5
      numberOfVerticalLines: 11
      averaging: 1
    input:
      signal: '${graph.spectrum_engine.output.buffer}'
    meta:
      surface_default:
        detachedWidth: 512
        attachedWidth: 349
        detached: false
        attachedHeight: 191
        detachedHeight: 512
      node:
        y: 54
        x: 847
        height: 306
        width: 349
  - name: waterfall
    module: waterfall
    device: cpu
    runtime: native
    provider: generic
    config:
      interpolate: true
      height: 512
    input:
      signal: '${graph.spectrum_engine.output.buffer}'
    meta:
      surface_default:
        detachedWidth: 512
        attachedWidth: 353
        detached: false
        attachedHeight: 208
        detachedHeight: 512
      node:
        y: 391
        x: 846
        height: 323
        width: 353
